<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#171428">

<title>StickerMaker Pro</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">

<h2>🎨 StickerMaker</h2>

<button id="uploadBtn">
📁 Rasm yuklash
</button>

<input
type="file"
id="imageLoader"
accept="image/*"
hidden>

<hr>

<button id="textBtn">
📝 Matn qo'shish
</button>

<button id="emojiBtn">
😀 Emoji
</button>

<button id="shapeBtn">
⬜ Shakl
</button>

<hr>

<label>Zoom</label>

<input
type="range"
id="zoom"
min="10"
max="300"
value="100">

<label>Rotate</label>

<input
type="range"
id="rotate"
min="-180"
max="180"
value="0">

<label>Opacity</label>

<input
type="range"
id="opacity"
min="0"
max="100"
value="100">

<hr>

<label>Ramka</label>

<select id="frameStyle">

<option value="none">
Yo'q
</option>

<option value="white">
Oq
</option>

<option value="black">
Qora
</option>

<option value="gradient">
Gradient
</option>

</select>

<label>Qalinlik</label>

<input
type="range"
id="frameSize"
min="0"
max="50"
value="12">

<hr>

<button id="flipX">
↔ Flip X
</button>

<button id="flipY">
↕ Flip Y
</button>

<button id="deleteLayer">
🗑 O'chirish
</button>

<button id="undo">
↩ Undo
</button>

<button id="redo">
↪ Redo
</button>

<hr>

<button id="downloadPNG" class="green">
⬇ PNG
</button>

<button id="downloadJPG" class="blue">
⬇ JPG
</button>

</div>

<div class="editor">

<canvas
id="canvas"
width="1080"
height="1080">
</canvas>

</div>

<script src="script.js"></script>

</body>
</html>
